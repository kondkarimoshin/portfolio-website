spring:
  datasource:
    url: jdbc:postgresql://prod-db:5432/portfolio_db
    username: portfolio_user
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    root: INFO
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false